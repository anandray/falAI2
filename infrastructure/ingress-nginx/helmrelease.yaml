apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ingress-nginx
  namespace: ingress-nginx
spec:
  interval: 30m
  chart:
    spec:
      chart: ingress-nginx
      version: 4.9.1
      sourceRef:
        kind: HelmRepository
        name: ingress-nginx
        namespace: ingress-nginx
  values:
    controller:
      replicaCount: 1
      service:
        type: NodePort
        nodePorts:
          http: 30080
      admissionWebhooks:
        enabled: false
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
