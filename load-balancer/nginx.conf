events {
    worker_connections 64;
}

http {
    # Upstream points to the cluster running the gateway service.
    # Traffic enters via the nginx ingress controller's NodePort (30080).
    #
    # To reroute traffic to a new cluster, change the upstream server
    # to the new cluster's worker node and reload:
    #   docker exec api-lb nginx -s reload

    upstream gateway {
        server old-cluster-worker:30080;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://gateway;
            proxy_set_header Host $host;
            proxy_connect_timeout 5s;
            proxy_read_timeout 10s;
        }
    }
}
