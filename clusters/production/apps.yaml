apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  interval: 30s
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./apps
  prune: true
  timeout: 3m
  dependsOn:
    - name: infrastructure
  postBuild:
    substitute:
      CLUSTER_NAME: "old-cluster"
